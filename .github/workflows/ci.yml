name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: yarn }
      - run: yarn install --immutable
      - run: yarn tsc --noEmit
      - run: yarn eslint .
      - run: yarn test
      - run: npx expo export --platform web
